exclude: |
  (?x)^(
    services/migrations/|
    frontend/|
    society_connect/settings/(?:dev|prod|stage)\.sample\.py$|
    static/|
    media/|
    \.venv/|
    venv/|
    (?:.*/)?__pycache__/|
    \.pytest_cache/|
    \.ruff_cache/
  )

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        name: bandit security scan
        exclude: ^tests/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
