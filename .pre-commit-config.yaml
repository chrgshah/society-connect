exclude: |
  (?x)^(
    services/migrations/|
    frontend/|
    society_connect/settings/(?:dev|prod|stage)\.sample\.py$|
    static/|
    media/|
    \.venv/|
    venv/|
    (?:.*/)?__pycache__/|
    \.pytest_cache/|
    \.ruff_cache/
  )

repos:
  - repo: local
    hooks:
      - id: backend-test-coverage
        name: backend tests with 90% coverage
        entry: >-
          python3 -m pytest
          --cov=core
          --cov=services
          --cov-report=term-missing
          --cov-fail-under=85
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        name: bandit security scan
        args:
          - --recursive
          - .
          - --exclude
          - ./frontend,./services/migrations,./.venv,./venv
          - --skip
          - B101
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
