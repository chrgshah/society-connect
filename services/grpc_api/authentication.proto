syntax = "proto3";

package society_connect.authentication.v1;

// A gRPC version of the existing REST login API.
service AuthenticationService {
  // Validate a user's credentials and issue an access/refresh token pair.
  rpc Login(LoginRequest) returns (LoginResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string access_token = 3;
  string refresh_token = 4;
  string user_id = 5;
  string username = 6;
  string email = 7;
}
